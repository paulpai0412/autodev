  set_only_at_workflow_start: true
  mutable_after_start: false
  scope: "workflow_run_only"
  applies_to: "all_prs_created_by_this_run"
  affects_stage: "release_worker_only"
  override_source: "none"
  human_approval_skipped: false

state:
  completed:
    - "Late successful release result for issue #42 arrived after failure recovery. Reconcile the control plane into completed and continue issue selection."
  in_progress:
    - "Prepare the orchestrator session to enter issue #42 PR flow."
  next:
    - "Run supervisor reconcile for issue #42 to persist issue_worker_execution before creating or switching the issue branch and launching the first issue_worker subagent."
  blockers:
    - "none"

refs:
  issue_packet: "docs/agents/issue-packets/issue-42.yaml"
  worker_result: "docs/agents/worker-results/issue-42.yaml"
  evidence_packet: ""
  handoff: "docs/agents/handoffs/issue-41.yaml"
  artifact_bundle: ""

compact_payload:
  active_target: {issue_number: "42", branch: "agent/issue-42-demo", role: "main_orchestrator", agent: "build", next_flow: "per_issue_flow"}
  authoritative_refs: ["docs/agents/issue-packets/issue-42.yaml", "docs/agents/handoffs/issue-41.yaml", "/home/timmypai/apps/autodev/docs/agents/autonomous-development-workflow.yaml"]
  state_snapshot:
    completed: ["Late successful release result for issue #42 arrived after failure recovery. Reconcile the control plane into completed and continue issue selection."]
    in_progress: ["Prepare the orchestrator session to enter issue #42 PR flow."]
    next: ["Run supervisor reconcile for issue #42 to persist issue_worker_execution before creating or switching the issue branch and launching the first issue_worker subagent."]
    blockers: ["none"]
  resume_rules: ["Resume from checkpoint and compact payload, not full chat history.", "Keep raw evidence as refs only; do not inline logs or traces."]
  immediate_next_action: "Run supervisor reconcile for issue #42 to persist issue_worker_execution before creating or switching the issue branch and launching the first issue_worker subagent."

post_merge_workspace_hygiene:
  primary_workspace_branch_before: "main"
  primary_workspace_branch_after: "main"
  dirty_state_detected: false
  wip_branch_created: "none"
  stash_created: "none"
