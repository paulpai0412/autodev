schema_version: "1.0"
kind: worker_result
line_cap: 80
raw_evidence_policy: index_only_refs_no_raw_logs_or_transcripts

issue:
  number: "42"
  title: "Demo issue"
  url: "https://github.com/example/issues/42"

branch: "agent/issue-42-demo"
status: "success"

summary:
  objective: "Delegate bootstrap startup through the DB-backed supervisor start path for issue #42."
  outcome: "Replaced the legacy file-backed bootstrap flow with DB-backed start-issue delegation and added focused regression coverage without claiming final acceptance QA."

files_changed:
  - path: "scripts/orchestrator_bootstrap_runner.py"
    summary: "Turned the bootstrap runner into a thin wrapper around DB-backed supervisor startup."
  - path: "scripts/orchestrator_supervisor.py"
    summary: "Added DB-backed start-issue and show-session support plus dispatch history recording."
  - path: "tests/scripts/test_orchestrator_bootstrap_runner.py"
    summary: "Replaced legacy file-flow assertions with DB-backed bootstrap delegation coverage."
  - path: "tests/scripts/test_orchestrator_supervisor.py"
    summary: "Added focused coverage for supervisor start_issue and show_latest_session behavior."

verification:
